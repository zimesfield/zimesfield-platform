name: Publish Maven Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      # =====================
      # Checkout
      # =====================
      - name: Checkout
        uses: actions/checkout@v6

      # =====================
      # JDK Setup
      # =====================
      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      # =====================
      # Import GPG Key (required for Central)
      # =====================
      - name: Import GPG Key
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

      # =====================
      # Maven settings (Central credentials)
      # =====================
      - name: Configure Maven Central credentials
        uses: s4u/maven-settings-action@v4.0.0
        with:
          servers: |
            [
              {
                "id": "central",
                "username": "${{ secrets.CENTRAL_USERNAME }}",
                "password": "${{ secrets.CENTRAL_PASSWORD }}"
              }
            ]

      # =====================
      # Extract Version from Tag
      # =====================
      - name: Extract Version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Publishing version: $VERSION"

      # =====================
      # Build & Verify (NO DEPLOY HERE)
      # =====================
      - name: Build and Verify
        run: |
          ./mvnw clean verify -Prelease -Drevision=${VERSION} --no-transfer-progress

      # =====================
      # Publish to Maven Central (MODERN WAY)
      # =====================
      - name: Publish to Maven Central
        run: |
          ./mvnw org.sonatype.central:central-publishing-maven-plugin:0.10.0:publish \
            -pl platform-bom,platform-parent \
            -Drevision=${VERSION}
#          starters/service-starter,\
#          starters/modulith-starter,\
#          starters/library-starter,\
#          starters/openapi-starter \
#            -Drevision=${VERSION}