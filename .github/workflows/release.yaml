name: Publish Maven Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Import GPG Key
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

      - name: Configure Maven Central credentials
        uses: s4u/maven-settings-action@v4.0.0
        with:
          servers: |
            [
              {
                "id": "central",
                "username": "${{ secrets.CENTRAL_USERNAME }}",
                "password": "${{ secrets.CENTRAL_PASSWORD }}"
              }
            ]

      - name: Get Git Version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          elif [[ "${GITHUB_REF_NAME}" == "develop" ]]; then
            VERSION="1.0.0-SNAPSHOT"
          else
            SAFE=$(echo "${GITHUB_REF_NAME}" | tr '/' '-')
            VERSION="1.0.0-${SAFE}-SNAPSHOT"
          fi

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Detected version: $VERSION"


      - name: Publish to Maven Central
        run: |
          ./mvnw clean deploy -Prelease -Drevision=${VERSION} -DskipTests --no-transfer-progress